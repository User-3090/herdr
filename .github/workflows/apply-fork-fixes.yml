name: Apply fork theme and cursor fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout fork branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: windows-conpty-theme
          fetch-depth: 0
          persist-credentials: true

      - name: Verify expected branch head
        shell: pwsh
        run: |
          $actual = (git rev-parse HEAD).Trim()
          if ($actual -ne "d5fced642eaa8c098f270b8a473c4bd401db17ea") {
            throw "unexpected branch head: $actual"
          }

      - name: Apply source changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "src/app/mod.rs",
              '''    let manual_name = config
                  .theme
                  .name
                  .clone()
                  .unwrap_or_else(|| "catppuccin".to_string());
              let (default_dark, default_light) = sibling_theme_names(&manual_name);
              state::ThemeRuntimeConfig {
                  manual_name,
                  dark_name: config.theme.dark_name.clone().unwrap_or(default_dark),
                  light_name: config.theme.light_name.clone().unwrap_or(default_light),
                  auto_switch: config.theme.auto_switch,
          ''',
              '''    let has_explicit_theme = config.theme.name.is_some()
                  || config.theme.dark_name.is_some()
                  || config.theme.light_name.is_some()
                  || config.theme.custom.is_some();
              let manual_name = config
                  .theme
                  .name
                  .clone()
                  .unwrap_or_else(|| "catppuccin".to_string());
              let (default_dark, default_light) = if has_explicit_theme {
                  sibling_theme_names(&manual_name)
              } else {
                  ("catppuccin".to_string(), "one-light".to_string())
              };
              state::ThemeRuntimeConfig {
                  manual_name,
                  dark_name: config.theme.dark_name.clone().unwrap_or(default_dark),
                  light_name: config.theme.light_name.clone().unwrap_or(default_light),
                  auto_switch: config.theme.auto_switch || !has_explicit_theme,
          ''',
          )

          replace_once(
              "src/app/mod.rs",
              '''    #[test]
              fn theme_auto_switch_is_opt_in_and_preserves_manual_default() {
          ''',
              '''    #[test]
              fn unconfigured_theme_follows_host_and_uses_one_light() {
                  let config = Config::default();
                  let (_api_tx, api_rx) = tokio::sync::mpsc::unbounded_channel();
                  let mut app =
                      App::new(&config, true, None, api_rx, crate::api::EventHub::default());

                  assert!(app.state.theme_runtime.auto_switch);
                  assert_eq!(app.state.theme_name, "catppuccin");
                  assert_eq!(app.state.palette, state::Palette::catppuccin());
                  assert!(app.set_host_terminal_appearance(
                      crate::terminal_theme::HostAppearance::Light,
                      false,
                  ));
                  assert_eq!(app.state.theme_name, "one-light");
                  assert_eq!(app.state.palette, state::Palette::one_light());
              }

              #[test]
              fn explicit_theme_preserves_manual_default_without_auto_switch() {
          ''',
          )

          replace_once(
              "src/protocol/wire.rs",
              "pub const PROTOCOL_VERSION: u32 = 17;",
              "pub const PROTOCOL_VERSION: u32 = 18;",
          )

          replace_once(
              "src/protocol/render_ansi.rs",
              '''pub(crate) fn frame_with_drawn_cursor(mut frame: FrameData) -> FrameData {
              if let Some(cursor) = frame.cursor.as_ref().filter(|cursor| cursor.visible) {
                  let (x, y) = clamp_cursor_position(&frame, cursor.x, cursor.y);
                  let idx = (y as usize)
                      .saturating_mul(frame.width as usize)
                      .saturating_add(x as usize);
                  if let Some(cell) = frame.cells.get_mut(idx) {
                      cell.modifier ^= REVERSED_MODIFIER;
                  }
              }
              frame
          }
          ''',
              '''pub(crate) fn frame_with_drawn_cursor(mut frame: FrameData) -> FrameData {
              if let Some(cursor) = frame.cursor.as_ref().filter(|cursor| cursor.visible) {
                  let (x, y) = clamp_cursor_position(&frame, cursor.x, cursor.y);
                  let idx = (y as usize)
                      .saturating_mul(frame.width as usize)
                      .saturating_add(x as usize);
                  if let Some(cell) = frame.cells.get_mut(idx) {
                      if let Some((foreground, background)) = drawn_cursor_colors(cell) {
                          cell.fg = foreground;
                          cell.bg = background;
                          cell.modifier &= !REVERSED_MODIFIER;
                      } else {
                          cell.modifier ^= REVERSED_MODIFIER;
                      }
                  }
              }
              frame
          }

          fn drawn_cursor_colors(cell: &CellData) -> Option<(u32, u32)> {
              let effective_background = if cell.modifier & REVERSED_MODIFIER != 0 {
                  cell.fg
              } else {
                  cell.bg
              };
              let (r, g, b) = packed_color_rgb(effective_background)?;
              let luminance = u32::from(r) * 299 + u32::from(g) * 587 + u32::from(b) * 114;
              if luminance >= 128_000 {
                  Some((0x00_00_00_10, 0x00_00_00_01))
              } else {
                  Some((0x00_00_00_01, 0x00_00_00_10))
              }
          }

          fn packed_color_rgb(value: u32) -> Option<(u8, u8, u8)> {
              match value >> 24 {
                  0x00 => match value & 0xff {
                      0x01 => Some((0, 0, 0)),
                      0x02 => Some((128, 0, 0)),
                      0x03 => Some((0, 128, 0)),
                      0x04 => Some((128, 128, 0)),
                      0x05 => Some((0, 0, 128)),
                      0x06 => Some((128, 0, 128)),
                      0x07 => Some((0, 128, 128)),
                      0x08 => Some((192, 192, 192)),
                      0x09 => Some((128, 128, 128)),
                      0x0a => Some((255, 0, 0)),
                      0x0b => Some((0, 255, 0)),
                      0x0c => Some((255, 255, 0)),
                      0x0d => Some((0, 0, 255)),
                      0x0e => Some((255, 0, 255)),
                      0x0f => Some((0, 255, 255)),
                      0x10 => Some((255, 255, 255)),
                      _ => None,
                  },
                  0x02 => Some((
                      ((value >> 16) & 0xff) as u8,
                      ((value >> 8) & 0xff) as u8,
                      (value & 0xff) as u8,
                  )),
                  _ => None,
              }
          }
          ''',
          )

          replace_once(
              "src/protocol/render_ansi.rs",
              '''    #[test]
              fn drawn_cursor_ignores_hidden_cursor() {
          ''',
              '''    #[test]
              fn drawn_cursor_uses_black_block_on_light_background() {
                  let frame = FrameData {
                      cells: vec![make_cell(" ", 0, 0x02_f0_f0_f0, 0)],
                      width: 1,
                      height: 1,
                      cursor: Some(CursorState {
                          x: 0,
                          y: 0,
                          visible: true,
                          shape: 2,
                      }),
                      hyperlinks: Vec::new(),
                      graphics: Vec::new(),
                  };

                  let drawn = frame_with_drawn_cursor(frame);

                  assert_eq!(drawn.cells[0].fg, 0x00_00_00_10);
                  assert_eq!(drawn.cells[0].bg, 0x00_00_00_01);
                  assert_eq!(drawn.cells[0].modifier & REVERSED_MODIFIER, 0);
              }

              #[test]
              fn drawn_cursor_uses_white_block_on_dark_background() {
                  let frame = FrameData {
                      cells: vec![make_cell(" ", 0, 0x02_10_10_10, 0)],
                      width: 1,
                      height: 1,
                      cursor: Some(CursorState {
                          x: 0,
                          y: 0,
                          visible: true,
                          shape: 2,
                      }),
                      hyperlinks: Vec::new(),
                      graphics: Vec::new(),
                  };

                  let drawn = frame_with_drawn_cursor(frame);

                  assert_eq!(drawn.cells[0].fg, 0x00_00_00_01);
                  assert_eq!(drawn.cells[0].bg, 0x00_00_00_10);
                  assert_eq!(drawn.cells[0].modifier & REVERSED_MODIFIER, 0);
              }

              #[test]
              fn drawn_cursor_ignores_hidden_cursor() {
          ''',
          )
          PY

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1
        with:
          toolchain: 1.96.1
          components: rustfmt,clippy
          targets: x86_64-pc-windows-msvc

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
          use-cache: false

      - name: Format, lint, test, and build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-Checked {
            param([string] $Command, [string[]] $Arguments)
            & $Command @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "command failed with exit code $LASTEXITCODE`: $Command $($Arguments -join ' ')"
            }
          }
          Invoke-Checked cargo @("fmt")
          Invoke-Checked cargo @("clippy", "--bin", "herdr", "--locked", "--target", "x86_64-pc-windows-msvc", "--", "-D", "warnings")
          Invoke-Checked cargo @("test", "--locked", "--target", "x86_64-pc-windows-msvc", "--bin", "herdr", "theme_")
          Invoke-Checked cargo @("test", "--locked", "--target", "x86_64-pc-windows-msvc", "--bin", "herdr", "drawn_cursor")
          Invoke-Checked cargo @("test", "--locked", "--target", "x86_64-pc-windows-msvc", "--bin", "herdr", "client_input_events_roundtrip")
          Invoke-Checked cargo @("build", "--locked", "--target", "x86_64-pc-windows-msvc")
          Invoke-Checked git @("diff", "--check")

      - name: Commit and push verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/mod.rs src/protocol/render_ansi.rs src/protocol/wire.rs
          git diff --cached --check
          git commit -m "fix: align light theme and cursor rendering" -m "refs #1530"
          git push origin HEAD:windows-conpty-theme